<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pothole Dodger — Richmond, VA</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/theme.css" />
</head>
<body>
  <h1>🚗 Pothole Dodger</h1>
  <p class="subtitle">Richmond, VA — routes that avoid pothole hotspots</p>

  <div class="card">
    <label for="origin">Origin</label>
    <div class="input-row">
      <div class="autocomplete-wrapper">
        <input type="text" id="origin" placeholder="123 Main St, Richmond, VA" autocomplete="off" />
        <div class="autocomplete-dropdown" id="originDropdown"></div>
      </div>
      <button class="btn-locate" id="locateBtn" title="Use my location">📍</button>
    </div>
    <div class="geo-status" id="geoStatus"></div>

    <label for="destination">Destination</label>
    <div class="input-row">
      <div class="autocomplete-wrapper">
        <input type="text" id="destination" placeholder="456 Broad St, Richmond, VA" autocomplete="off" />
        <div class="autocomplete-dropdown" id="destDropdown"></div>
      </div>
    </div>

    <button class="btn-go" id="goBtn">Get Pothole-Dodging Route</button>

    <div class="status" id="status"></div>

    <div id="hazard-map"></div>

    <div class="preview-panel" id="previewPanel">
      <div class="preview-row">
        <span class="preview-label">Direct route</span>
        <span class="preview-value" id="directStats">—</span>
      </div>
      <div class="preview-row">
        <span class="preview-label">Dodging route</span>
        <span class="preview-value" id="dodgeStats">—</span>
      </div>
      <div class="preview-recommendation" id="recommendation"></div>
      <div class="preview-buttons">
        <a id="dodgeBtn" class="btn-go btn-preview-action" target="_blank" rel="noopener noreferrer">Open Dodging Route</a>
        <a id="directBtn" class="btn-direct btn-preview-action" target="_blank" rel="noopener noreferrer">Open Direct Route</a>
      </div>
    </div>
  </div>

  <p class="footer">Uses OpenStreetMap Nominatim geocoding · No API key required · Open-source</p>

  <script type="module" src="js/app.js"></script>
</body>
</html>
