name: RVA311 Hazard Pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout PotholeDodger
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run pipeline
        run: python scripts/rva311_pipeline.py

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/rva311-hazards.txt
          git diff --cached --quiet || git commit -m "chore: update RVA311 hazard URL list"
          git pull --rebase
          git push
